background {
    monitor =
    path = screenshot
    blur_passes = 2
    blur_size = 7
    brightness = 0.75
}

label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date '+%H:%M')</b>"
    color = rgba(ebdbb2ff)  # Gruvbox fg
    font_size = 72
    font_family = Berkeley Mono
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date '+%A, %B %-d')"
    color = rgba(a89984ff)  # Gruvbox gray
    font_size = 20
    font_family = Berkeley Mono
    position = 0, 40
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    outer_color = rgb(928374)   # Gruvbox gray
    inner_color = rgb(282828)   # Gruvbox bg
    font_color = rgb(ebdbb2)    # Gruvbox fg
    check_color = rgb(b8bb26)   # Gruvbox green
    fail_color = rgb(cc241d)    # Gruvbox red
    capslock_color = rgb(d79921) # Gruvbox yellow
    placeholder_text = <i>password</i>
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    rounding = 4
    fade_on_empty = true
    position = 0, -60
    halign = center
    valign = center
}
