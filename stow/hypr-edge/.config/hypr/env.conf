# Environment variables for Hyprland

# Wayland/Hyprland specific
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# Qt applications
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_SCALE_FACTOR,1

# GTK applications
env = GDK_BACKEND,wayland,x11
env = GDK_SCALE,1
env = GDK_DPI_SCALE,1

# Mozilla applications
env = MOZ_ENABLE_WAYLAND,1
# Force Firefox to use Wayland and respect system scaling
env = MOZ_WAYLAND_USE_VAAPI,1
env = MOZ_USE_XINPUT2,1
env = MOZ_DBUS_REMOTE,1
# Force Firefox DPI awareness
env = MOZ_X11_EGL,1

# Font rendering improvements
env = FREETYPE_PROPERTIES,truetype:interpreter-version=40

# XWayland scaling fixes for high-DPI
env = _JAVA_OPTIONS,-Dsun.java2d.uiScale=1
env = WINE_DPI,96

# GPU-specific settings (set per-machine in machine.conf — see bottom of hyprland.conf)
# env = LIBVA_DRIVER_NAME,nvidia          # NVIDIA desktop
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia  # NVIDIA desktop
# env = WLR_NO_HARDWARE_CURSORS,1         # NVIDIA desktop
# env = NIXOS_OZONE_WL,1                  # NixOS only

# Cursor theme and size
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita

# Hyprland settings
env = HYPRSHOT_DIR,$HOME/Pictures/Screenshots
