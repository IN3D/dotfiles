# Visual appearance settings
# Gruvbox Dark palette — rgba format for use in this file
# Backgrounds
#   rgba(1d2021ff)  bg hard
#   rgba(282828ff)  bg
#   rgba(32302fff)  bg soft
#   rgba(3c3836ff)  bg1
#   rgba(504945ff)  bg2
#   rgba(665c54ff)  bg3
#   rgba(7c6f64ff)  bg4
# Foregrounds
#   rgba(ebdbb2ff)  fg
#   rgba(d5c4a1ff)  fg2
#   rgba(bdae93ff)  fg3
#   rgba(a89984ff)  fg4 / gray bright
# Accents             normal          bright
#   red             rgba(cc241dff)  rgba(fb4934ff)
#   green           rgba(98971aff)  rgba(b8bb26ff)
#   yellow          rgba(d79921ff)  rgba(fabd2fff)
#   blue            rgba(458588ff)  rgba(83a598ff)
#   purple          rgba(b16286ff)  rgba(d3869bff)
#   aqua            rgba(689d6aff)  rgba(8ec07cff)
#   orange          rgba(d65d0eff)  rgba(fe8019ff)
#   gray            rgba(928374ff)  rgba(a89984ff)

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2

    # Gruvbox-inspired colors
    col.active_border = rgba(427b58ff)   # Gruvbox dark aqua
    col.inactive_border = rgba(928374aa) # Gruvbox gray

    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1d2021ee) # Gruvbox dark background
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

# Rendering improvements for better text quality
render {
    # NOTE: this worked fine on NixOS, but has been an issue on every other
    # distro. Maybe it's NixOS specific?
    # Enable explicit synchronization for better performance and quality
    # explicit_sync = 2

    # Disable direct scanout for better compatibility with scaling
    direct_scanout = false
}

# XWayland configuration for better text rendering
xwayland {
    # Force XWayland windows to use integer scaling
    force_zero_scaling = true
}

# Gruvbox-inspired window group colors
group {
    col.border_active = rgba(458588ff)    # Gruvbox green
    col.border_inactive = rgba(928374aa)  # Gruvbox gray

    groupbar {
        gradients = false
        render_titles = false
        col.active = rgba(458588ff)
        col.inactive = rgba(928374aa)
    }
}

misc {
    # Disable default Hyprland background (use black instead)
    disable_hyprland_logo = true
    disable_splash_rendering = true
    background_color = rgb(000000)
}
