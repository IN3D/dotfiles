# ============================= Window rules ===================================

# Floating =====================================================================
# Float certain windows by default
windowrulev2 = float, title:(Open File)
windowrulev2 = float, title:(Save File)
windowrulev2 = float, title:(File Operation Progress)
windowrulev2 = float, class:(file-roller)
windowrulev2 = float, class:(gnome-calculator)

# Specific applications
windowrulev2 = float, class:(pavucontrol)
windowrulev2 = float, class:(blueman-manager)
windowrulev2 = float, class:(nm-applet)
windowrulev2 = float, class:(nm-connection-editor)

# Picture-in-Picture
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin, title:^(Picture-in-Picture)$

# File manager
windowrulev2 = float, class:(org.gnome.Nautilus)
windowrulev2 = size 1200 800, class:(org.gnome.Nautilus)

# Image viewer
windowrulev2 = float, class:(org.gnome.Loupe)
windowrulev2 = size 1200 800, class:(org.gnome.Loupe)

windowrulev2 = float, class:(chrome-web.telegram).*
windowrulev2 = size 1200 800, class:(chrome-web.telegram).*

# Fullscreen apps ==============================================================
# Gaming applications
windowrulev2 = fullscreen, class:^(steam_app_).*
windowrulev2 = fullscreen, class:(gamescope)

# Opacity settings =============================================================
windowrulev2 = opacity 0.9, class:(emacs)
windowrulev2 = opacity 0.97, class:(cursor)
windowrulev2 = opacity 0.95, class:^(.*ghostty)
windowrulev2 = opacity 0.9, class:(Alacritty)
windowrulev2 = opacity 0.9, class:(kitty)

# Terminals ====================================================================

# NOTE: turning this off while I experiment with stabilizing my layout
# Float terminals by default with custom size
# windowrulev2 = float, class:^(.*ghostty)
windowrulev2 = size 1080 640, class:^(.*ghostty)

# windowrulev2 = float, class:(kitty)
windowrulev2 = size 1080 640, class:(kitty)

# windowrulev2 = float, class:(Alacritty)
windowrulev2 = size 1080 640, class:(Alacritty)
